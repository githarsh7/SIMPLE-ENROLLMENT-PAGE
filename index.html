<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Development Workshop Enrollment</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="container">

    <!-- Left Section -->
    <div class="left">
      <img src="./webdev.jpg" alt="">
    </div>

    <!-- Right Section -->
    <div class="right">
      <h1>Web Development Workshop</h1>
      <p class="seats"> Number of available seats : <span>28</span></p>

      <form>

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
          <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <i class="fa-regular fa-envelope"></i>
          <input type="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-phone"></i>
          <input type="text" placeholder="Phone No" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-check"></i>
          <select required>
            <option value="">Choose no of Seats</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
          </select>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-circle-user"></i>
          <input type="text" placeholder="Second username">
        </div>

        <div class="buttons">
          <button type="submit" class="submit">Submit</button>
          <button type="reset" class="cancel">Cancel</button>
        </div>

      </form>
    </div>

  </div>

</body>
</html>
